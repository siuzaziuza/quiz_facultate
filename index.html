<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Facultate</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div id="start-screen">

        <h1>🎓 Ce facultate ți se potrivește?</h1>

        <p>
            Răspunde la câteva întrebări și află ce facultăți și domenii ți se potrivesc cel mai bine.
        </p>

        <button onclick="startQuiz()">
            Începe testul
        </button>

    </div>

    <div id="quiz-screen" style="display:none;">

        <div class="progress">

            <div id="progress-bar"></div>

        </div>

        <p id="question-number"></p>

        <h2 id="question"></h2>

        <div id="answers"></div>

    </div>

    <div id="result-screen" style="display:none;">

        <h1>Rezultatul tău</h1>

        <div id="results"></div>

        <button onclick="location.reload()">
            Reia testul
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
